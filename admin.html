<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理画面 | Silence in Frame</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Sans+JP:wght@200;300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <!-- ヘッダー -->
    <header class="admin-header">
        <div class="header-container">
            <div class="header-left">
                <h1 class="header-title">Silence in Frame</h1>
                <span class="header-badge">管理画面</span>
            </div>
            <a href="/" class="header-link">ポートフォリオを見る &rarr;</a>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="admin-main">
        <!-- アップロードセクション -->
        <section class="upload-section">
            <h2 class="section-title">写真をアップロード</h2>
            <form id="upload-form" class="upload-form">
                <div class="upload-dropzone" id="dropzone">
                    <div class="dropzone-content" id="dropzone-content">
                        <svg class="dropzone-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor"
                            stroke-width="1.5">
                            <path d="M8 32l10-10 8 8 6-6 8 8" />
                            <rect x="4" y="4" width="40" height="40" rx="4" />
                            <circle cx="16" cy="16" r="4" />
                        </svg>
                        <p class="dropzone-text">ここに写真をドラッグ＆ドロップ</p>
                        <p class="dropzone-subtext">または</p>
                        <label class="dropzone-button" for="photo-input">ファイルを選択</label>
                        <p class="dropzone-hint">JPEG, PNG, WebP, GIF / 最大20MB</p>
                    </div>
                    <div class="dropzone-preview" id="dropzone-preview" style="display: none;">
                        <img id="preview-image" alt="プレビュー">
                        <button type="button" class="preview-remove" id="preview-remove">&times;</button>
                    </div>
                    <input type="file" id="photo-input" name="photo" accept="image/jpeg,image/png,image/webp,image/gif"
                        hidden>
                </div>

                <div class="form-fields">
                    <div class="form-group">
                        <label for="photo-title">タイトル</label>
                        <input type="text" id="photo-title" name="title" placeholder="作品のタイトル" required>
                    </div>
                    <div class="form-group">
                        <label for="photo-category">カテゴリ</label>
                        <select id="photo-category" name="category">
                            <option value="Shrine">Shrine（神社）</option>
                            <option value="Temple">Temple（寺院）</option>
                            <option value="Sacred">Sacred（聖域）</option>
                            <option value="Nature">Nature（自然）</option>
                            <option value="Portrait">Portrait（ポートレート）</option>
                            <option value="Street">Street（ストリート）</option>
                            <option value="Other">Other（その他）</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label for="photo-description">説明</label>
                        <textarea id="photo-description" name="description" placeholder="作品の説明"
                            rows="3"></textarea>
                    </div>
                </div>

                <button type="submit" class="submit-button" id="submit-button" disabled>
                    <span class="submit-text">アップロード</span>
                    <span class="submit-loading" style="display: none;">
                        <span class="spinner"></span>アップロード中...
                    </span>
                </button>
            </form>
        </section>

        <!-- 写真一覧セクション -->
        <section class="photos-section">
            <div class="section-header">
                <h2 class="section-title">写真一覧</h2>
                <span class="photo-count" id="photo-count">0枚</span>
            </div>
            <div class="photos-grid" id="photos-grid">
                <div class="photos-loading" id="photos-loading">
                    <span class="spinner"></span>
                    <p>読み込み中...</p>
                </div>
            </div>
        </section>
    </main>

    <!-- 編集モーダル -->
    <div class="edit-modal" id="edit-modal">
        <div class="edit-modal-overlay" id="edit-modal-overlay"></div>
        <div class="edit-modal-content">
            <h3 class="edit-modal-title">写真を編集</h3>
            <form id="edit-form">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label for="edit-title">タイトル</label>
                    <input type="text" id="edit-title" required>
                </div>
                <div class="form-group">
                    <label for="edit-category">カテゴリ</label>
                    <select id="edit-category">
                        <option value="Shrine">Shrine（神社）</option>
                        <option value="Temple">Temple（寺院）</option>
                        <option value="Sacred">Sacred（聖域）</option>
                        <option value="Nature">Nature（自然）</option>
                        <option value="Portrait">Portrait（ポートレート）</option>
                        <option value="Street">Street（ストリート）</option>
                        <option value="Other">Other（その他）</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="edit-description">説明</label>
                    <textarea id="edit-description" rows="3"></textarea>
                </div>
                <div class="edit-modal-actions">
                    <button type="button" class="btn-cancel" id="edit-cancel">キャンセル</button>
                    <button type="submit" class="btn-save">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- トースト通知 -->
    <div class="toast-container" id="toast-container"></div>

    <script src="admin.js"></script>
</body>

</html>
