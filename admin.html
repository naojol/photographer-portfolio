<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理画面 | Silence in Frame</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Sans+JP:wght@200;300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <div class="login-screen" id="login-screen">
        <div class="login-overlay"></div>
        <div class="login-container">
            <h1 class="login-logo">Silence in Frame</h1>
            <p class="login-subtitle">管理画面</p>
            <form class="login-form" id="login-form">
                <div class="login-field">
                    <input type="email" id="login-email" placeholder="メールアドレス" required autocomplete="email">
                </div>
                <div class="login-field">
                    <input type="password" id="login-password" placeholder="パスワード" required autocomplete="current-password">
                </div>
                <p class="login-error" id="login-error"></p>
                <button type="submit" class="login-button" id="login-button">
                    <span class="login-button-text">ログイン</span>
                    <span class="login-button-loading" style="display:none"><span class="spinner"></span></span>
                </button>
            </form>
        </div>
    </div>

    <div class="app-screen" id="app-screen" style="display:none">
        <header class="admin-header">
            <div class="header-container">
                <div class="header-left">
                    <h1 class="header-title">Silence in Frame</h1>
                    <span class="header-badge">管理画面</span>
                </div>
                <div class="header-right">
                    <a href="/" class="header-link" target="_blank">サイトを見る</a>
                    <button class="logout-button" id="logout-button">ログアウト</button>
                </div>
            </div>
        </header>

        <main class="admin-main">
            <section class="upload-section">
                <h2 class="section-title">写真をアップロード</h2>
                <form id="upload-form" class="upload-form">
                    <div class="upload-dropzone" id="dropzone">
                        <div class="dropzone-content" id="dropzone-content">
                            <svg class="dropzone-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M8 32l10-10 8 8 6-6 8 8" />
                                <rect x="4" y="4" width="40" height="40" rx="4" />
                                <circle cx="16" cy="16" r="4" />
                            </svg>
                            <p class="dropzone-text">ここに写真をドラッグ＆ドロップ</p>
                            <p class="dropzone-subtext">または</p>
                            <label class="dropzone-button" for="photo-input">ファイルを選択</label>
                            <p class="dropzone-hint">JPEG, PNG, WebP, GIF / 最大20MB / 複数選択可</p>
                        </div>
                        <input type="file" id="photo-input" name="photos" accept="image/jpeg,image/png,image/webp,image/gif" multiple hidden>
                    </div>

                    <div class="batch-preview" id="batch-preview" style="display:none">
                        <div class="batch-preview-header">
                            <span id="batch-count">0枚選択中</span>
                            <button type="button" class="batch-clear" id="batch-clear">すべて取り消し</button>
                        </div>
                        <div class="batch-preview-grid" id="batch-preview-grid"></div>
                    </div>

                    <div class="form-fields" id="upload-fields" style="display:none">
                        <div class="form-group">
                            <label for="photo-category">カテゴリ</label>
                            <select id="photo-category" name="category">
                                <option value="Shrine">Shrine（神社）</option>
                                <option value="Temple">Temple（寺院）</option>
                                <option value="Sacred">Sacred（聖域）</option>
                                <option value="Nature">Nature（自然）</option>
                                <option value="Portrait">Portrait（ポートレート）</option>
                                <option value="Street">Street（ストリート）</option>
                                <option value="Other">Other（その他）</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="photo-title">タイトル（一括適用 / 個別は後から編集）</label>
                            <input type="text" id="photo-title" name="title" placeholder="無題">
                        </div>
                        <div class="form-group full-width">
                            <label for="photo-description">説明</label>
                            <textarea id="photo-description" name="description" placeholder="作品の説明" rows="2"></textarea>
                        </div>
                    </div>

                    <div class="upload-progress" id="upload-progress" style="display:none">
                        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
                        <p class="progress-text" id="progress-text">アップロード中...</p>
                    </div>

                    <button type="submit" class="submit-button" id="submit-button" style="display:none">
                        <span class="submit-text">アップロード</span>
                    </button>
                </form>
            </section>

            <div class="migrate-banner" id="migrate-banner" style="display:none">
                <p>デフォルト写真（5枚）をSupabaseに移行して管理できます。</p>
                <button class="migrate-button" id="migrate-button">デフォルト写真を移行</button>
            </div>

            <section class="photos-section">
                <div class="section-header-row">
                    <h2 class="section-title">写真一覧</h2>
                    <span class="photo-count" id="photo-count">0枚</span>
                </div>
                <div class="photos-grid" id="photos-grid">
                    <div class="photos-loading" id="photos-loading"><span class="spinner"></span><p>読み込み中...</p></div>
                </div>
            </section>
        </main>
    </div>

    <div class="modal-overlay" id="edit-modal" style="display:none">
        <div class="modal-backdrop" data-close="edit"></div>
        <div class="modal-content">
            <h3 class="modal-title">写真を編集</h3>
            <form id="edit-form">
                <input type="hidden" id="edit-id">
                <div class="modal-image-preview" id="edit-image-preview"></div>
                <div class="form-group"><label for="edit-title">タイトル</label><input type="text" id="edit-title" required></div>
                <div class="form-group"><label for="edit-category">カテゴリ</label>
                    <select id="edit-category"><option value="Shrine">Shrine</option><option value="Temple">Temple</option><option value="Sacred">Sacred</option><option value="Nature">Nature</option><option value="Portrait">Portrait</option><option value="Street">Street</option><option value="Other">Other</option></select>
                </div>
                <div class="form-group"><label for="edit-description">説明</label><textarea id="edit-description" rows="3"></textarea></div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" data-close="edit">キャンセル</button>
                    <button type="submit" class="btn-save">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="delete-modal" style="display:none">
        <div class="modal-backdrop" data-close="delete"></div>
        <div class="modal-content modal-confirm">
            <h3 class="modal-title">写真を削除</h3>
            <p class="confirm-text">この写真を削除しますか？この操作は取り消せません。</p>
            <div class="confirm-preview" id="delete-preview"></div>
            <input type="hidden" id="delete-id">
            <input type="hidden" id="delete-storage-path">
            <div class="modal-actions">
                <button type="button" class="btn-cancel" data-close="delete">キャンセル</button>
                <button type="button" class="btn-danger" id="delete-confirm">削除する</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase-config.js"></script>
    <script src="admin.js"></script>
</body>

</html>
